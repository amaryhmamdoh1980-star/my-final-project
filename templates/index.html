<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המורה החכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #075e54; --bg: #e5ddd5; --user: #dcf8c6; --bot: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #header { background: var(--primary); color: white; padding: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
        .logo { width: 35px; height: 35px; border-radius: 50%; background: white; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .lang-switcher { display: flex; gap: 5px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 15px; }
        .lang-btn { background: none; border: none; color: white; cursor: pointer; font-size: 11px; opacity: 0.6; }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 2px solid white; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 16px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; position: relative; }
        .message img { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; border: 1px solid #ddd; }
        .rtl .user { align-self: flex-start; background: var(--user); border-top-left-radius: 2px; }
        .rtl .bot { align-self: flex-end; background: var(--bot); border-top-right-radius: 2px; }
        .ltr .user { align-self: flex-end; background: var(--user); border-top-right-radius: 2px; }
        .ltr .bot { align-self: flex-start; background: var(--bot); border-top-left-radius: 2px; }
        .typing { display: none; gap: 4px; padding: 12px; background: var(--bot); border-radius: 15px; width: fit-content; align-self: flex-end; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: #888; border-radius: 50%; animation: bounce 1.3s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }
        #input-area { background: #f0f0f0; padding: 10px; border-top: 1px solid #ccc; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        #user-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid white; outline: none; font-size: 16px; }
        .btn-round { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-only { background: none; border: none; font-size: 22px; color: #54656f; cursor: pointer; }
        .message-content h1,.message-content h2,.message-content h3 { margin: 8px 0 4px; }
        .message-content ul,.message-content ol { padding-right: 20px; }
        .message-content p { margin: 4px 0; }
        .file-preview { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .file-preview i { font-size: 20px; }
        .pdf-icon { color: #e74c3c; } .word-icon { color: #2980b9; } .excel-icon { color: #27ae60; } .txt-icon { color: #7f8c8d; }
        .remove-btn { margin-right: auto; cursor: pointer; color: #999; font-size: 16px; background: none; border: none; }
        /* שאלת שמירה */
        .save-question { margin-top: 10px; padding: 10px 12px; background: #e8f4fd; border-radius: 10px; border-right: 3px solid #4285F4; font-size: 14px; }
        .save-question p { margin: 0 0 8px 0; }
        .save-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .save-yes { background: #4285F4; color: white; border: none; border-radius: 15px; padding: 6px 16px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .save-yes:hover { background: #3367d6; }
        .save-no { background: #e0e0e0; color: #333; border: none; border-radius: 15px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
        /* toast notification */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 9999; display: none; }
    </style>
</head>
<body class="rtl" id="app-body">
    <div id="header">
        <button class="icon-only" style="color:white" onclick="window.print()"><i class="fas fa-file-pdf"></i></button>
        <div class="header-left">
            <a href="https://sites.google.com/view/geology-info/" target="_blank"><img src="/static/icon.png" class="logo"></a>
            <span id="txt-title" style="font-weight:bold">המורה החכם</span>
            <div class="lang-switcher">
                <button class="lang-btn active" id="l-he" onclick="setLanguage('he')">HE</button>
                <button class="lang-btn" id="l-ar" onclick="setLanguage('ar')">AR</button>
                <button class="lang-btn" id="l-en" onclick="setLanguage('en')">EN</button>
            </div>
        </div>
        <a href="https://sites.google.com/view/geology-info/%D7%91%D7%99%D7%AA/%D7%9E%D7%99-%D7%90%D7%A0%D7%99?authuser=0" target="_blank">
            <img src="/static/uploads/images (2).jfif" class="profile-img">
        </a>
    </div>

    <div id="chat-window">
        <div class="message bot" id="txt-welcome">שלום! אני כאן בשבילך. תוכל לשאול שאלות, להעלות תמונות, או לצרף מסמכים (PDF, Word, Excel, טקסט) ואענה עליהם.</div>
        <div id="typing-bubble" class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div id="input-area">
        <div id="preview-box" style="display:none; padding:5px;">
            <div id="img-preview-wrap" style="display:none; text-align:center;">
                <img id="preview-img-src" style="max-height:70px; border-radius:5px;">
                <button onclick="document.getElementById('file-in').value=''; document.getElementById('img-preview-wrap').style.display='none'; checkPreviewBox();">×</button>
            </div>
            <div id="doc-preview-wrap" style="display:none;">
                <div class="file-preview">
                    <i id="doc-icon" class="fas fa-file"></i>
                    <span id="doc-name"></span>
                    <button class="remove-btn" onclick="removeDoc()"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
        <div class="input-row">
            <input type="file" id="file-in" hidden accept="image/*" onchange="showImgPreview(this)">
            <button class="icon-only" onclick="document.getElementById('file-in').click()" title="העלה תמונה"><i class="fas fa-camera"></i></button>
            <input type="file" id="doc-in" hidden accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" onchange="showDocPreview(this)">
            <button class="icon-only" onclick="document.getElementById('doc-in').click()" title="העלה מסמך"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="user-input" placeholder="הקלד שאלה..." onkeypress="if(event.key==='Enter') send()">
            <button class="icon-only" id="mic-btn"><i class="fas fa-microphone"></i></button>
            <button class="btn-round" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="toast"></div>

<script>
    let currentLang = 'he';
    let chatHistory = [];
    const win = document.getElementById('chat-window');
    const typing = document.getElementById('typing-bubble');

    function showToast(msg, duration = 3000) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', duration);
    }

    function setLanguage(lang) {
        currentLang = lang;
        const labels = { he: "המורה החכם", ar: "المعلم الذكي", en: "Smart Teacher" };
        const inputs = { he: "הקלד שאלה...", ar: "اكتب سؤالاً...", en: "Type a question..." };
        document.getElementById('txt-title').innerText = labels[lang];
        document.getElementById('user-input').placeholder = inputs[lang];
        document.getElementById('app-body').className = (lang === 'en' ? 'ltr' : 'rtl');
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'l-'+lang));
    }

    function checkPreviewBox() {
        const img = document.getElementById('img-preview-wrap').style.display !== 'none';
        const doc = document.getElementById('doc-preview-wrap').style.display !== 'none';
        document.getElementById('preview-box').style.display = (img || doc) ? 'block' : 'none';
    }

    function showImgPreview(input) {
        if (input.files && input.files[0]) {
            removeDoc();
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-img-src').src = e.target.result;
                document.getElementById('img-preview-wrap').style.display = 'block';
                document.getElementById('preview-box').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function getDocIcon(filename) {
        const f = filename.toLowerCase();
        if (f.endsWith('.pdf')) return ['fa-file-pdf', 'pdf-icon'];
        if (f.endsWith('.doc') || f.endsWith('.docx')) return ['fa-file-word', 'word-icon'];
        if (f.endsWith('.xls') || f.endsWith('.xlsx')) return ['fa-file-excel', 'excel-icon'];
        return ['fa-file-alt', 'txt-icon'];
    }

    function showDocPreview(input) {
        if (input.files && input.files[0]) {
            document.getElementById('file-in').value = '';
            document.getElementById('img-preview-wrap').style.display = 'none';
            const [iconClass, colorClass] = getDocIcon(input.files[0].name);
            const icon = document.getElementById('doc-icon');
            icon.className = `fas ${iconClass} ${colorClass}`;
            document.getElementById('doc-name').innerText = input.files[0].name;
            document.getElementById('doc-preview-wrap').style.display = 'block';
            document.getElementById('preview-box').style.display = 'block';
        }
    }

    function removeDoc() {
        document.getElementById('doc-in').value = '';
        document.getElementById('doc-preview-wrap').style.display = 'none';
        checkPreviewBox();
    }

    function cleanText(text) {
        if (/<[a-z][\s\S]*>/i.test(text)) {
            const tmp = document.createElement('div');
            tmp.innerHTML = text;
            return tmp.innerText;
        }
        return text;
    }

    // העתק ללוח + פתח Google Docs
    async function saveToGoogleDocs(btn, userMsg, botReply) {
        const content = `📚 המורה החכם — שיחה שמורה\n${'='.repeat(40)}\n\n❓ שאלה:\n${userMsg}\n\n💡 תשובה:\n${botReply.replace(/[*#`]/g, '').trim()}\n\n${'='.repeat(40)}\nנוצר ע"י המורה החכם`;

        try {
            await navigator.clipboard.writeText(content);
            showToast('✅ הטקסט הועתק! Google Docs נפתח — לחץ Ctrl+V להדבקה');
        } catch (e) {
            // גיבוי אם clipboard נחסם
            const ta = document.createElement('textarea');
            ta.value = content;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✅ הטקסט הועתק! לחץ Ctrl+V ב-Google Docs');
        }

        // פתח Google Docs בחלון חדש
        window.open('https://docs.new', '_blank');

        // עדכן כפתור
        btn.closest('.save-btns').innerHTML = '<span style="color:#27ae60; font-size:13px;">✅ הועתק ונפתח Google Docs — הדבק עם Ctrl+V</span>';
    }

    function addSaveOption(div, userMsg, botReply) {
        const saveBox = document.createElement('div');
        saveBox.className = 'save-question';
        saveBox.innerHTML = `<p>💾 רוצה לשמור את השיחה ב-Google Docs?</p>
            <div class="save-btns">
                <button class="save-yes" id="gdocs-btn-${Date.now()}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
                    שמור ב-Google Docs
                </button>
                <button class="save-no" onclick="this.closest('.save-question').remove()">לא תודה</button>
            </div>`;
        
        // חיבור לאחר הוספה ל-DOM
        setTimeout(() => {
            const yesBtn = saveBox.querySelector('.save-yes');
            if (yesBtn) yesBtn.onclick = () => saveToGoogleDocs(yesBtn, userMsg, botReply);
        }, 0);

        div.appendChild(saveBox);
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const imgFile = document.getElementById('file-in').files[0];
        const docFile = document.getElementById('doc-in').files[0];
        if (!text && !imgFile && !docFile) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        if (docFile) {
            const [iconClass, colorClass] = getDocIcon(docFile.name);
            const fp = document.createElement('div');
            fp.className = 'file-preview';
            fp.innerHTML = `<i class="fas ${iconClass} ${colorClass}"></i><span>${docFile.name}</span>`;
            userDiv.appendChild(fp);
        }
        if (imgFile) {
            const img = document.createElement('img');
            img.src = document.getElementById('preview-img-src').src;
            userDiv.appendChild(img);
        }
        if (text) {
            const t = document.createElement('div');
            t.innerText = text;
            userDiv.appendChild(t);
        }
        win.insertBefore(userDiv, typing);
        input.value = '';
        document.getElementById('preview-box').style.display = 'none';
        document.getElementById('img-preview-wrap').style.display = 'none';
        document.getElementById('doc-preview-wrap').style.display = 'none';
        typing.style.display = 'flex';
        win.scrollTop = win.scrollHeight;

        const formData = new FormData();
        formData.append('message', text);
        if (imgFile) formData.append('image', imgFile);
        if (docFile) formData.append('document', docFile);
        formData.append('history', JSON.stringify(chatHistory));

        document.getElementById('file-in').value = '';
        document.getElementById('doc-in').value = '';

        try {
            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();
            typing.style.display = 'none';
            const userText = text || (docFile ? docFile.name : 'תמונה');
            chatHistory.push({role: "user", text: userText});
            chatHistory.push({role: "model", text: data.reply});
            addBotMessage(data.reply, data.image_url, userText);
        } catch (e) {
            typing.style.display = 'none';
            addBotMessage("שגיאה בחיבור לשרת.");
        }
    }

    function addBotMessage(text, imageUrl = null, userMsg = '') {
        const div = document.createElement('div');
        div.className = 'message bot';
        const cleanedText = cleanText(text);
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = marked.parse(cleanedText);
        div.appendChild(contentDiv);

        if (imageUrl) {
            const imgContainer = document.createElement('div');
            imgContainer.style.cssText = "margin-top:10px; position:relative; min-height:150px; background:#f0f0f0; border-radius:10px; overflow:hidden;";
            const loadTxt = document.createElement('div');
            loadTxt.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#888; font-size:13px;";
            loadTxt.innerText = "טוען תמונה...";
            imgContainer.appendChild(loadTxt);
            const img = document.createElement('img');
            img.src = imageUrl;
            img.style.cssText = "width:100%; display:none; border-radius:10px;";
            img.onload = function() { loadTxt.style.display='none'; imgContainer.style.background='none'; imgContainer.style.minHeight='0'; this.style.display='block'; };
            img.onerror = function() { imgContainer.style.display='none'; };
            imgContainer.appendChild(img);
            div.appendChild(imgContainer);
        }

        const btn = document.createElement('button');
        btn.className = 'icon-only';
        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
        btn.style.marginTop = "8px";
        btn.onclick = () => handleVoice(btn, cleanedText);
        div.appendChild(btn);

        addSaveOption(div, userMsg, cleanedText);

        win.insertBefore(div, typing);
        win.scrollTop = win.scrollHeight;
    }

    function handleVoice(btn, text) {
        if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); return; }
        const clean = text.replace(/[*#`_]/g, "");
        const msg = new SpeechSynthesisUtterance(clean);
        const isHebrew = /[א-ת]/.test(clean);
        const isArabic = /[\u0600-\u06FF]/.test(clean);
        msg.lang = isHebrew ? 'he-IL' : (isArabic ? 'ar-SA' : 'en-US');
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    const micBtn = document.getElementById('mic-btn');
    const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (SpeechRec) {
        const r = new SpeechRec();
        micBtn.onclick = () => { r.lang = (currentLang === 'he' ? 'he-IL' : currentLang === 'ar' ? 'ar-SA' : 'en-US'); r.start(); micBtn.style.color = 'red'; };
        r.onresult = e => document.getElementById('user-input').value = e.results[0][0].transcript;
        r.onend = () => micBtn.style.color = '#54656f';
    }
</script>
</body>
</html>
