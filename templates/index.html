<script>
    let currentLang = 'he';
    let chatHistory = [];
    const win = document.getElementById('chat-window');
    const typing = document.getElementById('typing-bubble');

    function setLanguage(lang) {
        currentLang = lang;
        const labels = { he: "המורה החכם", ar: "المعلم الذكي", en: "Smart Teacher" };
        const inputs = { he: "הקלד שאלה...", ar: "اكتب سؤالاً...", en: "Type a question..." };
        document.getElementById('txt-title').innerText = labels[lang];
        document.getElementById('user-input').placeholder = inputs[lang];
        document.getElementById('app-body').className = (lang === 'en' ? 'ltr' : 'rtl');
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'l-'+lang));
    }

    function showPreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('preview-img-src').src = e.target.result; document.getElementById('preview-box').style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const file = document.getElementById('file-in').files[0];
        if (!text && !file) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        if (file) {
            const img = document.createElement('img');
            img.src = document.getElementById('preview-img-src').src;
            userDiv.appendChild(img);
        }
        const t = document.createElement('div'); t.innerText = text; userDiv.appendChild(t);
        win.insertBefore(userDiv, typing);
        input.value = ''; document.getElementById('preview-box').style.display='none';
        typing.style.display = 'flex';
        win.scrollTop = win.scrollHeight;

        const formData = new FormData();
        formData.append('message', text);
        if (file) formData.append('image', file);
        formData.append('history', JSON.stringify(chatHistory));

        try {
            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();
            typing.style.display = 'none';
            chatHistory.push({role: "user", text: text});
            chatHistory.push({role: "model", text: data.reply});
            addBotMessage(data.reply);
        } catch (e) { typing.style.display = 'none'; addBotMessage("Error."); }
    }

    function addBotMessage(text) {
        const div = document.createElement('div');
        div.className = 'message bot';
        
        let cleanText = text;
        let imageHTML = "";
        const match = text.match(/\[IMAGE_KEYWORD:\s*(.*?)\]/i);
        
        if (match) {
            const keyword = match[1].trim();
            // שימוש בפורמט הקישור הכי אמין שיש ליצירת תמונות
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(keyword)}?width=1024&height=768&seed=42&nologo=true`;
            
            imageHTML = `
                <div style="margin-top: 10px; position: relative; min-height: 200px; background: #f0f0f0; border-radius: 10px; overflow: hidden;">
                    <img src="${imgUrl}" 
                         style="width: 100%; display: block; border-radius: 10px;" 
                         onload="this.parentElement.style.background='none'"
                         onerror="this.src='https://loremflickr.com/800/600/${encodeURIComponent(keyword)}'">
                </div>`;
            
            cleanText = text.replace(match[0], "");
        }

        const contentDiv = document.createElement('div');
        contentDiv.innerHTML = marked.parse(cleanText);
        div.appendChild(contentDiv);
        
        if (imageHTML) {
            const container = document.createElement('div');
            container.innerHTML = imageHTML;
            div.appendChild(container);
        }

        const btn = document.createElement('button');
        btn.className = 'icon-only'; btn.innerHTML = '<i class="fas fa-volume-up"></i>';
        btn.style.marginTop = "8px";
        btn.onclick = () => handleVoice(btn, cleanText);
        div.appendChild(btn);

        win.insertBefore(div, typing);
        win.scrollTop = win.scrollHeight;
    }

    function handleVoice(btn, text) {
        if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); return; }
        const clean = text.replace(/[*#`_]/g, "");
        const msg = new SpeechSynthesisUtterance(clean);
        
        // זיהוי שפה
        const isHebrew = /[א-ת]/.test(clean);
        const isArabic = /[\u0600-\u06FF]/.test(clean);
        msg.lang = isHebrew ? 'he-IL' : (isArabic ? 'ar-SA' : 'en-US');

        // הכרחת הטלפון למצוא קול מתאים
        const voices = window.speechSynthesis.getVoices();
        const targetVoice = voices.find(v => v.lang.startsWith(msg.lang.split('-')[0]));
        if (targetVoice) msg.voice = targetVoice;

        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    const micBtn = document.getElementById('mic-btn');
    const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (SpeechRec) {
        const r = new SpeechRec();
        micBtn.onclick = () => { r.lang = (currentLang === 'he' ? 'he-IL' : currentLang === 'ar' ? 'ar-SA' : 'en-US'); r.start(); micBtn.style.color = 'red'; };
        r.onresult = e => document.getElementById('user-input').value = e.results[0][0].transcript;
        r.onend = () => micBtn.style.color = '#54656f';
    }
</script>
