<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המורה החכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #075e54; --bg: #e5ddd5; --user: #dcf8c6; --bot: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        #header { background: var(--primary); color: white; padding: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
        .logo { width: 35px; height: 35px; border-radius: 50%; background: white; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }

        .lang-switcher { display: flex; gap: 5px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 15px; }
        .lang-btn { background: none; border: none; color: white; cursor: pointer; font-size: 11px; opacity: 0.6; }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 2px solid white; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 16px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        
        .rtl .user { align-self: flex-start; background: var(--user); border-top-left-radius: 2px; }
        .rtl .bot { align-self: flex-end; background: var(--bot); border-top-right-radius: 2px; }
        .ltr .user { align-self: flex-end; background: var(--user); border-top-right-radius: 2px; }
        .ltr .bot { align-self: flex-start; background: var(--bot); border-top-left-radius: 2px; }

        /* עיצוב בועות חשיבה */
        .typing-indicator { display: flex; gap: 4px; padding: 12px; background: var(--bot); border-radius: 15px; width: fit-content; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .dot { width: 8px; height: 8px; background: #888; border-radius: 50%; animation: bounce 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }

        .message a { color: #075e54; font-weight: bold; text-decoration: underline; }
        .msg-tools { margin-top: 5px; border-top: 1px solid #eee; padding-top: 5px; }
        
        #input-area { background: #f0f0f0; padding: 10px; border-top: 1px solid #ccc; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        #user-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid white; outline: none; }
        .btn-round { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-only { background: none; border: none; font-size: 22px; color: #54656f; cursor: pointer; }
        #preview-box { display: none; padding: 5px; text-align: center; position: relative; }
    </style>
</head>
<body class="rtl" id="app-body">

    <div id="header">
        <button class="icon-only" style="color:white" onclick="window.print()"><i class="fas fa-file-pdf"></i></button>
        <div class="header-left">
            <a href="https://sites.google.com/view/geology-info/" target="_blank"><img src="/static/icon.png" class="logo"></a>
            <span id="txt-title" style="font-weight:bold">המורה החכם</span>
            <div class="lang-switcher">
                <button class="lang-btn active" id="l-he" onclick="setLanguage('he')">HE</button>
                <button class="lang-btn" id="l-ar" onclick="setLanguage('ar')">AR</button>
                <button class="lang-btn" id="l-en" onclick="setLanguage('en')">EN</button>
            </div>
        </div>
        <a href="https://sites.google.com/view/geology-info/%D7%91%D7%99%D7%AA/%D7%9E%D7%99%D7%A0%D7%99?authuser=0" target="_blank">
            <img src="/static/uploads/images (2).jfif" class="profile-img">
        </a>
    </div>

    <div id="chat-window">
        <div class="message bot" id="txt-welcome">שלום! אני כאן בשבילך. איך אוכל לעזור לך היום?</div>
    </div>

    <div id="input-area">
        <div id="preview-box">
            <img id="preview-img-src" style="max-height: 70px; border-radius: 5px;">
            <button onclick="document.getElementById('file-in').value=''; document.getElementById('preview-box').style.display='none';" style="position:absolute; background:red; color:white; border-radius:50%; border:none; width:20px; height:20px;">×</button>
        </div>
        <div class="input-row">
            <input type="file" id="file-in" hidden accept="image/*" onchange="showPreview(this)">
            <button class="icon-only" onclick="document.getElementById('file-in').click()"><i class="fas fa-camera"></i></button>
            <input type="text" id="user-input" placeholder="הקלד שאלה..." onkeypress="if(event.key==='Enter') send()">
            <button class="icon-only" id="mic-btn"><i class="fas fa-microphone"></i></button>
            <button class="btn-round" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const ui = {
            he: { title: "המורה החכם", input: "הקלד שאלה...", welcome: "שלום! אני כאן בשבילך. איך אוכל לעזור היום?", speak: "הקרא", stop: "עצור", dir: "rtl", lang: "he-IL" },
            ar: { title: "المعلم الذكي", input: "اكتب سؤالاً...", welcome: "مرحباً! أنا هنا من أجلك. كيف يمكنني مساعدتك اليوم؟", speak: "استماع", stop: "توقف", dir: "rtl", lang: "ar-SA" },
            en: { title: "Smart Teacher", input: "Type a question...", welcome: "Hello! I'm here for you. How can I help you today?", speak: "Speak", stop: "Stop", dir: "ltr", lang: "en-US" }
        };

        let currentLang = 'he';
        let chatHistory = [];
        const win = document.getElementById('chat-window');

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('txt-title').innerText = ui[lang].title;
            document.getElementById('user-input').placeholder = ui[lang].input;
            document.getElementById('txt-welcome').innerText = ui[lang].welcome;
            document.getElementById('app-body').className = ui[lang].dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'l-'+lang));
        }

        function showPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById('preview-img-src').src = e.target.result;
                    document.getElementById('preview-box').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('user-input');
            const fileIn = document.getElementById('file-in');
            const text = input.value.trim();
            const file = fileIn.files[0];
            if (!text && !file) return;

            // הודעת משתמש
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            if (file) {
                const img = document.createElement('img');
                img.src = document.getElementById('preview-img-src').src;
                img.style.maxWidth = "100%"; img.style.borderRadius = "10px";
                userDiv.appendChild(img);
            }
            const t = document.createElement('div'); t.innerText = text; userDiv.appendChild(t);
            win.appendChild(userDiv);
            input.value = ''; document.getElementById('preview-box').style.display='none';
            win.scrollTop = win.scrollHeight;

            // בועות חשיבה
            const typingId = "typing_" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'typing-indicator ' + (currentLang === 'en' ? 'ltr-bot' : '');
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            win.appendChild(typingDiv);
            win.scrollTop = win.scrollHeight;

            const formData = new FormData();
            formData.append('message', text);
            if (file) formData.append('image', file);
            formData.append('history', JSON.stringify(chatHistory));

            try {
                const res = await fetch('/chat', { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById(typingId).remove();
                chatHistory.push({role: "user", text: text});
                chatHistory.push({role: "model", text: data.reply});
                addBotMessage(data.reply);
            } catch (e) {
                if(document.getElementById(typingId)) document.getElementById(typingId).remove();
                addBotMessage("Error.");
            }
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div>${marked.parse(text)}</div><div class="msg-tools"><button class="icon-only" style="font-size:16px;" onclick="handleVoice(this, \`${text.replace(/[`*]/g, "")}\`)"><i class="fas fa-volume-up"></i></button></div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            div.querySelectorAll('a').forEach(a => a.target = "_blank");
        }

        function handleVoice(btn, text) {
            if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); btn.style.color = '#54656f'; return; }
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = (/[א-ת]/.test(text)) ? 'he-IL' : (/[أ-ي]/.test(text) ? 'ar-SA' : 'en-US');
            msg.onstart = () => btn.style.color = 'red';
            msg.onend = () => btn.style.color = '#54656f';
            window.speechSynthesis.speak(msg);
        }

        const micBtn = document.getElementById('mic-btn');
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (SpeechRec) {
            const r = new SpeechRec();
            micBtn.onclick = () => { r.lang = ui[currentLang].lang; r.start(); micBtn.style.color = 'red'; };
            r.onresult = e => document.getElementById('user-input').value = e.results[0][0].transcript;
            r.onend = () => micBtn.style.color = '#54656f';
        }
    </script>
</body>
</html>
